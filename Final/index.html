<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Memory Scrapbook</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="floating-background">
    <span>♡</span>
    <span>✿</span>
    <span>♡</span>
    <span>❀</span>
    <span>✧</span>
  </div>

  <header class="hero">
    <p class="mini-title">a tiny archive of soft memories</p>
    <h1>Digital Memory Scrapbook</h1>
    <p class="subtitle">a cozy little collection of soft memories ♡</p>
    <a href="#albums" class="view-button">View Albums</a>
  </header>

  <main>
    <section id="albums" class="album-section container">
      <h2 class="section-title">tiny memories</h2>

      <div class="row g-4 justify-content-center">

        <div class="col-md-4">
          <a href="gallery1.html" class="album-card">
            <div class="tape"></div>
            <img src="https://picsum.photos/500/300?random=1" alt="Gallery One">
            <h3>Gallery One</h3>
            <p>soft moments</p>
          </a>
        </div>

        <div class="col-md-4">
          <a href="gallery2.html" class="album-card">
            <div class="tape"></div>
            <img src="https://picsum.photos/500/300?random=2" alt="Gallery Two">
            <h3>Gallery Two</h3>
            <p>pretty days</p>
          </a>
        </div>

        <div class="col-md-4">
          <a href="gallery3.html" class="album-card">
            <div class="tape"></div>
            <img src="https://picsum.photos/500/300?random=3" alt="Gallery Three">
            <h3>Gallery Three</h3>
            <p>little memories</p>
          </a>
        </div>

      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
