<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery Two</title>

<body>

  <div class="floating f1">✿</div>

      </div>

      <div class="col-6 col-md-4">
        <img class="gallery-photo" src="https://picsum.photos/400/400?random=25" alt="memory photo">

      <div class="col-6 col-md-4">
        <img class="gallery-photo" src="https://picsum.photos/400/400?random=26" alt="memory photo">

  <script src="script.js"></script>
